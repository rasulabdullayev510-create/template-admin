<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex, nofollow"/>
<title>Admin — Business Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--bg4:#1f2d45;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#ffffff;--text2:rgba(255,255,255,0.6);--text3:rgba(255,255,255,0.3);
  --primary:#3b82f6;--primary-dark:#2563eb;--primary-glow:rgba(59,130,246,0.15);
  --green:#10b981;--green-bg:rgba(16,185,129,0.1);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,0.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);
  --radius:14px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* Login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(59,130,246,0.08) 0%,transparent 70%)}
.login-box{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:48px 40px;width:100%;max-width:380px}
.login-logo{font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:32px}
.login-title{font-size:2rem;font-weight:800;margin-bottom:6px;letter-spacing:-0.02em}
.login-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px}
.field label{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)}
.field input,.field select{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 15px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color 0.15s;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--primary)}
.field input::placeholder{color:var(--text3)}
.login-url{font-size:12px;color:var(--text3);margin-bottom:20px;word-break:break-all}
.btn{width:100%;background:var(--primary);color:#fff;border:none;border-radius:10px;padding:14px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.15s}
.btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
.btn:disabled{opacity:0.4;cursor:default;transform:none}
.err{font-size:13px;color:var(--red);margin-top:12px;display:none;text-align:center}

/* App shell */
.app{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:28px 16px;z-index:10}
.sb-brand{display:flex;align-items:center;gap:10px;padding:0 8px;margin-bottom:36px}
.sb-brand-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.sb-brand-name{font-size:14px;font-weight:700;color:var(--text)}
.sb-brand-sub{font-size:11px;color:var(--text3)}
.sb-section{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);padding:0 10px;margin:20px 0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all 0.15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;font-family:'Outfit',sans-serif}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--primary-glow);color:var(--primary);font-weight:600}
.nav-item-icon{width:18px;text-align:center;font-size:14px}
.sb-bottom{margin-top:auto}
.main{margin-left:240px;padding:40px;min-height:100vh}

/* Page header */
.page-hdr{margin-bottom:32px}
.page-hdr h1{font-size:1.8rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px}
.page-hdr p{font-size:14px;color:var(--text2)}

/* Stat cards */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.green::before{background:var(--green)}
.stat-card.blue::before{background:var(--primary)}
.stat-card.yellow::before{background:var(--yellow)}
.stat-card.red::before{background:var(--red)}
.stat-lbl{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.stat-num{font-size:2.4rem;font-weight:800;letter-spacing:-0.03em;line-height:1;margin-bottom:6px}
.stat-num.green{color:var(--green)}
.stat-num.blue{color:var(--primary)}
.stat-num.yellow{color:var(--yellow)}
.stat-sub{font-size:12px;color:var(--text3)}

/* Charts */
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:24px}
.chart-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px}
.card-sub{font-size:12px;color:var(--text3);margin-bottom:20px}

/* Schedule */
.schedule-list{display:flex;flex-direction:column;gap:8px;margin-top:4px;max-height:320px;overflow-y:auto}
.sched-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg3);border-radius:10px;border:1px solid var(--border)}
.sched-date{font-size:11px;font-weight:700;color:var(--primary);min-width:60px}
.sched-time{font-size:11px;color:var(--text3);min-width:54px}
.sched-name{font-size:13px;font-weight:600;flex:1}
.sched-svc{font-size:11px;color:var(--text2)}
.sched-price{font-size:13px;font-weight:700;color:var(--green)}
.no-sched{font-size:13px;color:var(--text3);text-align:center;padding:32px 0}

/* Table */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:20px}
.table-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-head-title{font-size:14px;font-weight:700}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);padding:12px 16px;border-bottom:1px solid var(--border)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase}
.badge-confirmed{background:rgba(59,130,246,0.15);color:var(--primary)}
.badge-pending{background:var(--yellow-bg);color:var(--yellow)}
.badge-denied,.badge-cancelled{background:var(--red-bg);color:var(--red)}
.badge-sent{background:var(--green-bg);color:var(--green)}
.badge-noshow{background:rgba(239,68,68,0.12);color:var(--red)}

/* Walkins form */
.form-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px}
.form-card h3{font-size:15px;font-weight:700;margin-bottom:4px}
.form-card p{font-size:13px;color:var(--text2);margin-bottom:24px}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:end}
.form-row .field{margin-bottom:0}
.btn-sm{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all 0.15s;height:44px}
.btn-sm:hover{background:var(--primary-dark)}
.form-msg{font-size:13px;margin-top:12px;display:none}
.form-msg.ok{color:var(--green)}
.form-msg.fail{color:var(--red)}

/* Conversion meter */
.conv-meter{margin-top:12px}
.conv-bar-bg{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:8px 0 4px}
.conv-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--green));transition:width 1s ease}
.conv-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}

/* Traffic cards */
.traffic-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.traffic-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.traffic-num{font-size:1.8rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px}
.traffic-lbl{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.08em}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* Mobile nav */
.mob-header{display:none;align-items:center;gap:12px;height:56px;padding:0 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20;flex-shrink:0;width:100%}
.mob-btn{background:none;border:none;font-size:22px;color:var(--text);cursor:pointer;padding:8px;border-radius:8px;font-family:inherit;line-height:1}
.mob-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:24;display:none}
.mob-overlay.open{display:block}

/* Mobile */
@media(max-width:900px){
  .app{flex-direction:column}
  .mob-header{display:flex}
  .sidebar{left:-260px;transition:left 0.25s ease;z-index:25;display:flex!important;top:0}
  .sidebar.open{left:0;box-shadow:8px 0 32px rgba(0,0,0,0.35)}
  .main{margin-left:0;padding:20px}
  .stats-row{grid-template-columns:1fr 1fr}
  .charts-row{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .traffic-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
  .stats-row{grid-template-columns:1fr 1fr}
  .traffic-grid{grid-template-columns:1fr 1fr}
  .main{padding:16px}
  .field input,.field select{font-size:16px}
  .login-box{padding:36px 24px}
  .stat-num{font-size:1.8rem}
}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{min-width:560px}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
}
</style>
</head>
<body>

<!-- ── Login ── -->
<div class="login" id="login">
  <div class="login-box">
    <div class="login-logo">Business Admin Portal</div>
    <div class="login-title">Welcome back</div>
    <p class="login-sub">Enter your backend URL and password to access your dashboard.</p>
    <div class="field">
      <label>Backend URL</label>
      <input type="text" id="api-url" placeholder="https://your-app.onrender.com" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
    </div>
    <p class="login-url" id="url-preview"></p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn" onclick="login()" id="login-btn">Access Dashboard</button>
    <div class="err" id="err">Wrong password or couldn't connect.</div>
  </div>
</div>

<!-- ── App ── -->
<div class="app" id="app">
  <!-- Mobile top bar -->
  <div class="mob-header" id="mob-header">
    <button class="mob-btn" onclick="toggleMobileMenu()">☰</button>
    <span id="mob-page-title" style="font-size:14px;font-weight:700;flex:1">Overview</span>
    <span id="sb-name-mob" style="font-size:12px;color:var(--text3)"></span>
  </div>
  <div class="mob-overlay" id="mob-overlay" onclick="toggleMobileMenu()"></div>

  <div class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div>
        <div class="sb-brand-name" id="sb-name">Dashboard</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:3px">
          <div class="sb-brand-dot"></div>
          <div class="sb-brand-sub">Live</div>
        </div>
      </div>
    </div>

    <div class="sb-section">Overview</div>
    <button class="nav-item active" onclick="showPage('overview',this)">
      <span class="nav-item-icon">◈</span> Overview
    </button>
    <button class="nav-item" onclick="showPage('schedule',this)">
      <span class="nav-item-icon">◷</span> Schedule
    </button>
    <button class="nav-item" onclick="showPage('traffic',this)">
      <span class="nav-item-icon">↗</span> Website Traffic
    </button>

    <div class="sb-section">Customers</div>
    <button class="nav-item" onclick="showPage('bookings',this)">
      <span class="nav-item-icon">☰</span> All Bookings
    </button>
    <button class="nav-item" onclick="showPage('clients',this)">
      <span class="nav-item-icon">👤</span> Clients
    </button>
    <button class="nav-item" onclick="showPage('manual',this)">
      <span class="nav-item-icon">＋</span> Manual Entry
    </button>
    <button class="nav-item" onclick="showPage('availability',this)">
      <span class="nav-item-icon">🚫</span> Block Times
    </button>
    <button class="nav-item" onclick="showPage('reviews',this)">
      <span class="nav-item-icon">★</span> Reviews
    </button>
    <button class="nav-item" onclick="showPage('expenses',this)">
      <span class="nav-item-icon">💸</span> Expenses
    </button>

    <div class="sb-bottom">
      <button class="nav-item" onclick="logout()">
        <span class="nav-item-icon">⏻</span> Log Out
      </button>
    </div>
  </div>

  <div class="main" id="main"></div>
</div>

<script>
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let API = '', pwd = '', stats = null, bookings = [], walkins = [], feedback = [], expenses = [];
let currentPage = 'overview', currentPeriod = 'today', currentBookingsFilter = 'all';

// Show URL preview as user types
document.getElementById('api-url').addEventListener('input', function() {
  document.getElementById('url-preview').textContent = this.value ? this.value + '/api/stats' : '';
});

async function login() {
  let rawUrl = (document.getElementById('api-url').value || '').trim().replace(/\/$/, '');
  if (rawUrl && !rawUrl.startsWith('http://') && !rawUrl.startsWith('https://')) rawUrl = 'https://' + rawUrl;
  API = rawUrl;
  pwd  = document.getElementById('pwd').value;
  if (!API || !pwd) { showErr('Enter your backend URL and password.'); return; }

  const btn = document.getElementById('login-btn');
  btn.textContent = 'Connecting...'; btn.disabled = true;

  try {
    const [sr, br, wr, fr, er] = await Promise.all([
      fetch(API + '/api/stats?password='    + encodeURIComponent(pwd)),
      fetch(API + '/api/bookings?password=' + encodeURIComponent(pwd)),
      fetch(API + '/api/walkins?password='  + encodeURIComponent(pwd)),
      fetch(API + '/api/feedback?password=' + encodeURIComponent(pwd)),
      fetch(API + '/api/expenses?password=' + encodeURIComponent(pwd)),
    ]);
    if (sr.status === 401) { showErr('Wrong password or couldn\'t connect.'); btn.textContent = 'Access Dashboard'; btn.disabled = false; return; }
    const safeJson = async r => { try { return r.ok ? await r.json() : []; } catch(e) { return []; } };
    stats    = await sr.json();
    bookings = await br.json();
    walkins  = await wr.json();
    feedback = await safeJson(fr);
    expenses = await safeJson(er);

    // Get business name
    const ir = await fetch(API + '/api/info');
    const info = await ir.json();
    document.getElementById('sb-name').textContent = info.businessName || 'Dashboard';
    document.title = (info.businessName || 'Business') + ' — Admin';
    const mn = document.getElementById('sb-name-mob'); if (mn) mn.textContent = info.businessName || '';

    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderOverview();
  } catch(e) {
    showErr('Could not connect. Check the URL.');
    btn.textContent = 'Access Dashboard'; btn.disabled = false;
  }
}

function showErr(msg) {
  const e = document.getElementById('err');
  e.textContent = msg; e.style.display = 'block';
}

const PAGE_TITLES = { overview:'Overview', schedule:'Schedule', traffic:'Website Traffic', bookings:'Bookings', clients:'Clients', manual:'Manual Entry', availability:'Block Times', reviews:'Reviews', expenses:'Expenses' };

function showPage(page, el) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');
  const t = document.getElementById('mob-page-title');
  if (t) t.textContent = PAGE_TITLES[page] || page;
  // Close mobile menu if open
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mob-overlay').classList.remove('open');
  if (page === 'overview')  renderOverview();
  else if (page === 'schedule') renderSchedule();
  else if (page === 'traffic')  renderTraffic();
  else if (page === 'bookings') renderBookings();
  else if (page === 'clients')  renderClients();
  else if (page === 'walkins')  renderWalkins();
  else if (page === 'manual')   renderManualEntry();
  else if (page === 'availability') renderAvailability();
  else if (page === 'reviews')  renderReviews();
  else if (page === 'expenses') renderExpenses();
}

function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mob-overlay').classList.toggle('open');
}

function fmt12(t) {
  const [h, m] = t.split(':'); const hr = parseInt(h);
  return (hr > 12 ? hr - 12 : hr || 12) + ':' + m + ' ' + (hr >= 12 ? 'PM' : 'AM');
}
function fmtDate(d) {
  const [y, mo, day] = d.split('-');
  return MONTHS[parseInt(mo)-1] + ' ' + parseInt(day);
}

// ── Overview ─────────────────────────────────────────────────
function renderOverview(period) {
  period = period || currentPeriod;
  currentPeriod = period;

  const today = new Date().toISOString().split('T')[0];
  const allConfirmed = bookings.filter(b => b.status === 'confirmed');
  const tabStyle = p => `padding:8px 18px;border-radius:8px;border:1.5px solid ${period===p?'var(--primary)':'var(--border2)'};background:${period===p?'var(--primary-glow)':'transparent'};color:${period===p?'var(--primary)':'var(--text2)'};font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s`;
  const tabs = `<div style="display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap">
    <button style="${tabStyle('today')}"   onclick="renderOverview('today')">Today</button>
    <button style="${tabStyle('week')}"    onclick="renderOverview('week')">This Week</button>
    <button style="${tabStyle('30days')}"  onclick="renderOverview('30days')">Past 30 Days</button>
    <button style="${tabStyle('alltime')}" onclick="renderOverview('alltime')">All Time</button>
  </div>`;

  // ── TODAY ──
  if (period === 'today') {
    const todayBks = allConfirmed.filter(b => b.date === today).sort((a,b) => a.time.localeCompare(b.time));
    const revenue   = todayBks.reduce((s,b) => s+b.servicePrice, 0);
    const mobileC   = todayBks.filter(b => b.serviceType === 'mobile').length;
    const dateStr   = new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    document.getElementById('main').innerHTML = `
      <div class="page-hdr"><h1>Overview</h1><p>${dateStr}</p></div>
      ${tabs}
      <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card green"><div class="stat-lbl">Revenue Today</div><div class="stat-num green">$${revenue.toLocaleString()}</div><div class="stat-sub">${todayBks.length} booking${todayBks.length!==1?'s':''}</div></div>
        <div class="stat-card blue"><div class="stat-lbl">Appointments</div><div class="stat-num blue">${todayBks.length}</div><div class="stat-sub">Scheduled today</div></div>
        <div class="stat-card yellow"><div class="stat-lbl">Mobile Jobs</div><div class="stat-num yellow">${mobileC}</div><div class="stat-sub">${todayBks.length-mobileC} in-shop</div></div>
      </div>
      <div class="chart-card">
        <div class="card-title">Today's Schedule</div>
        <div class="card-sub">${dateStr}</div>
        <div style="margin-top:16px">
          ${todayBks.length ? todayBks.map(b => {
            const isMob = b.serviceType === 'mobile';
            return `<div style="display:flex;align-items:flex-start;gap:16px;padding:16px 18px;background:var(--bg3);border-radius:12px;border:1px solid var(--border);margin-bottom:10px">
              <div style="text-align:center;min-width:62px;padding-top:2px">
                <div style="font-size:16px;font-weight:800;color:var(--primary)">${fmt12(b.time).replace(' AM','').replace(' PM','')}</div>
                <div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:0.06em">${fmt12(b.time).includes('AM')?'AM':'PM'}</div>
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:15px;font-weight:700;margin-bottom:2px">${b.customerName}</div>
                <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${b.serviceName}</div>
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  ${isMob
                    ? `<span style="background:rgba(245,158,11,0.12);color:var(--yellow);font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px">🚗 Mobile</span>${b.address?`<span style="font-size:12px;color:var(--text3)">${b.address}</span>`:''}`

                </div>
                ${b.phone?`<div style="font-size:11px;color:var(--text3);margin-top:5px">${b.phone}</div>`:''}
              </div>
              <div style="font-size:17px;font-weight:800;color:var(--green)">$${b.servicePrice}</div>

          </div>`}
        </div>
      </div>`;
    return;
  }

  // ── THIS WEEK ──
  if (period === 'week') {
    const day = new Date().getDay();
    const mondayOffset = day === 0 ? -6 : 1 - day;
    const weekDays = Array.from({length:7}, (_, i) => {
      const dd = new Date(); dd.setDate(dd.getDate() + mondayOffset + i);
      return dd.toISOString().split('T')[0];
    });
    const weekBks = allConfirmed.filter(b => b.date >= weekDays[0] && b.date <= weekDays[6]);
    const revenue  = weekBks.reduce((s,b) => s+b.servicePrice, 0);
    const upcoming = weekBks.filter(b => b.date >= today).sort((a,b) => a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    document.getElementById('main').innerHTML = `
      <div class="page-hdr"><h1>Overview</h1><p>This week at a glance</p></div>
      ${tabs}
      <div class="stats-row">
        <div class="stat-card green"><div class="stat-lbl">Revenue This Week</div><div class="stat-num green">$${revenue.toLocaleString()}</div><div class="stat-sub">Confirmed bookings</div></div>

          <div class="schedule-list">
            ${upcoming.length ? upcoming.slice(0,8).map(b => `
              <div class="sched-item">
                <span class="sched-date">${fmtDate(b.date)}</span>
                <span class="sched-time">${fmt12(b.time)}</span>
                <div style="flex:1"><div class="sched-name">${b.customerName}</div><div class="sched-svc">${b.serviceType==='mobile'?'🚗 '+(b.address||'Mobile'):b.serviceName}</div></div>

              </div>`).join('') : '<div class="no-sched">No more appointments this week</div>'}
          </div>
        </div>
      </div>`;
    setTimeout(() => {
      const ctx = document.getElementById('rev-chart');
      if (!ctx) return;
      new Chart(ctx.getContext('2d'), {
        type: 'bar',
        data: {
          labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
          datasets: [{ data: weekDays.map(d => weekBks.filter(b=>b.date===d).reduce((s,b)=>s+b.servicePrice,0)),
            backgroundColor: weekDays.map(d => d===today?'rgba(59,130,246,0.55)':'rgba(59,130,246,0.2)'),
            borderColor: weekDays.map(d => d===today?'rgba(59,130,246,1)':'rgba(59,130,246,0.6)'),

        }}
      });
    }, 50);
    return;
  }

  // ── PAST 30 DAYS ──
  if (period === '30days') {
    const d30 = new Date(); d30.setDate(d30.getDate()-29);
    const start30 = d30.toISOString().split('T')[0];
    const bks30  = allConfirmed.filter(b => b.date >= start30);
    const revenue = bks30.reduce((s,b) => s+b.servicePrice, 0);
    const upcoming = allConfirmed.filter(b => b.date >= today).sort((a,b) => a.date.localeCompare(b.date)||a.time.localeCompare(b.time));
    document.getElementById('main').innerHTML = `

      ${tabs}
      <div class="stats-row">

            <div style="font-size:3.5rem;font-weight:800;color:var(--primary);letter-spacing:-0.03em">${stats.convRate}%</div>
            <div style="font-size:13px;color:var(--text3);margin-top:4px">${stats.homeViews} visits → ${stats.totalBookings} bookings</div>
          </div>
          <div class="conv-meter">
            <div class="conv-bar-bg"><div class="conv-bar-fill" id="conv-fill" style="width:0%"></div></div>
            <div class="conv-labels"><span>0%</span><span>Industry avg 3%</span><span>10%</span></div>
          </div>
          <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:var(--text2)">Total site views</span><span style="font-weight:700">${stats.totalViews.toLocaleString()}</span></div>

      <div class="chart-card">

    setTimeout(() => {
      const ctx = document.getElementById('rev-chart');
      if (!ctx) return;

        type:'line',
        data:{
          labels: Object.keys(stats.viewsByDay).map(d => { const [,m,day]=d.split('-'); return `${parseInt(m)}/${parseInt(day)}`; }),
          datasets:[{ data: Object.keys(stats.viewsByDay).map(d => bookings.filter(b=>b.date===d&&b.status==='confirmed').reduce((s,b)=>s+b.servicePrice,0)),
            borderColor:'#10b981', backgroundColor:'rgba(16,185,129,0.08)',
            borderWidth:2, tension:0.4, fill:true, pointRadius:0, pointHoverRadius:4 }]

      if (cf) cf.style.width = Math.min(parseFloat(stats.convRate)*10,100)+'%';

    return;
  }

  // ── ALL TIME ──
  const earned   = stats.earnedRevenue   ?? stats.totalRevenue ?? 0;
  const upcoming = stats.upcomingRevenue ?? 0;
  const totalExp = stats.totalExpenses   ?? 0;
  const profit   = stats.netProfit       ?? (earned - totalExp);
  document.getElementById('main').innerHTML = `
    <div class="page-hdr"><h1>Overview</h1><p>All-time performance</p></div>
    ${tabs}
    <div class="stats-row">

function renderClients() {
  // Group confirmed bookings by phone (fall back to name if no phone)
  const clientMap = {};
  bookings.filter(b => b.status === 'confirmed' || b.status === 'noshow').forEach(b => {
    const key = b.phone ? b.phone.replace(/\D/g,'') : '__' + b.customerName.toLowerCase().trim();
    if (!clientMap[key]) {
      clientMap[key] = {
        name: b.customerName,
        phone: b.phone || '—',
        visits: 0,
        totalSpent: 0,
        services: {},
        firstVisit: b.date,
        lastVisit: b.date,
        onlineCount: 0,
        manualCount: 0,
        mobileCount: 0,
        inShopCount: 0,
        latestConfirmedId: null,
        latestConfirmedDate: null,
      };
    }
    const c = clientMap[key];
    if (b.status === 'confirmed') {
      c.visits++;
      c.totalSpent += Number(b.servicePrice) || 0;
      c.services[b.serviceName] = (c.services[b.serviceName] || 0) + 1;
      if (b.source === 'manual') c.manualCount++; else c.onlineCount++;
      if (b.serviceType === 'mobile') c.mobileCount++; else c.inShopCount++;
      if (!c.latestConfirmedDate || b.date > c.latestConfirmedDate) {
        c.latestConfirmedDate = b.date;
        c.latestConfirmedId   = b.id;
      }
    }
    if (b.date < c.firstVisit) c.firstVisit = b.date;
    if (b.date > c.lastVisit)  c.lastVisit  = b.date;
  });

  const clients = Object.values(clientMap).filter(c => c.visits > 0).sort((a, b) => b.totalSpent - a.totalSpent);

  document.getElementById('main').innerHTML = `
    <div class="page-hdr">
      <h1>Clients</h1>
      <p>${clients.length} unique customers · sorted by total spend</p>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>Customer</th><th>Visits</th><th>Total Spent</th><th>Booked Via</th><th>Service Type</th><th>Top Service</th><th>First Visit</th><th>Last Visit</th><th>Actions</th></tr></thead>
        <tbody>${clients.length ? clients.map((c, i) => {
          const topService = Object.entries(c.services).sort((a,b) => b[1]-a[1])[0];
          const allServices = Object.entries(c.services).map(([s,n]) => n > 1 ? `${s} ×${n}` : s).join(', ');
          const isRepeat = c.visits > 1;
          const sourceLabel = c.onlineCount > 0 && c.manualCount > 0 ? 'Online + Phone'
                            : c.onlineCount > 0 ? 'Online' : 'Phone / In-Person';
          const sourceBadgeColor = c.onlineCount > 0 && c.manualCount === 0 ? 'var(--primary)' : c.manualCount > 0 && c.onlineCount === 0 ? 'var(--yellow)' : 'var(--green)';
          const sourceBgColor = c.onlineCount > 0 && c.manualCount === 0 ? 'var(--primary-glow)' : c.manualCount > 0 && c.onlineCount === 0 ? 'var(--yellow-bg)' : 'var(--green-bg)';
          const typeCell = c.mobileCount > 0 && c.inShopCount > 0
            ? `<div style="display:flex;flex-direction:column;gap:3px"><span style="background:rgba(59,130,246,0.1);color:var(--primary);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px">📍 ${c.inShopCount}× In-Shop</span><span style="background:rgba(245,158,11,0.12);color:var(--yellow);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px">🚗 ${c.mobileCount}× Mobile</span></div>`
            : c.mobileCount > 0
            ? `<span style="background:rgba(245,158,11,0.12);color:var(--yellow);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px">🚗 Mobile</span>`
            : `<span style="background:rgba(59,130,246,0.1);color:var(--primary);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px">📍 In-Shop</span>`;
          return `<tr>
            <td style="color:var(--text3);font-size:12px">${i+1}</td>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div style="width:34px;height:34px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--text);flex-shrink:0">${c.name[0].toUpperCase()}</div>
                <div>
                  <div style="font-weight:600">${c.name}</div>
                  <div style="font-size:11px;color:var(--text3)">${c.phone}</div>
                </div>
              </div>
            </td>
            <td>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-weight:700;color:${isRepeat?'var(--primary)':'var(--text)'}">${c.visits}</span>
                ${isRepeat ? `<span style="background:var(--primary-glow);color:var(--primary);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:0.05em">REPEAT</span>` : ''}
              </div>
            </td>
            <td style="font-weight:700;color:var(--green);font-size:15px">$${c.totalSpent.toLocaleString()}</td>
            <td><span style="background:${sourceBgColor};color:${sourceBadgeColor};font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:0.04em">${sourceLabel}</span></td>
            <td>${typeCell}</td>
            <td>
              <div style="font-size:13px;color:var(--text2)">${topService ? topService[0] : '—'}</div>
              ${Object.keys(c.services).length > 1 ? `<div style="font-size:11px;color:var(--text3);margin-top:2px">${allServices}</div>` : ''}
            </td>
            <td style="color:var(--text3);font-size:12px">${fmtDate(c.firstVisit)}</td>
            <td style="color:${c.lastVisit === new Date().toISOString().split('T')[0] ? 'var(--green)' : 'var(--text3)'};font-size:12px">${fmtDate(c.lastVisit)}</td>
            <td>
              <div style="display:flex;flex-direction:column;gap:6px">
                ${c.phone !== '—' ? `<button onclick="sendWinback('${c.phone}','${c.name.replace(/'/g,"\\'")}',this)" style="padding:5px 11px;border-radius:7px;border:1.5px solid var(--primary);background:var(--primary-glow);color:var(--primary);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">📲 Win-Back</button>` : ''}
                ${c.latestConfirmedId ? `<button onclick="markNoShow('${c.latestConfirmedId}')" style="padding:5px 11px;border-radius:7px;border:1.5px solid var(--red);background:var(--red-bg);color:var(--red);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap">No-Show</button>` : ''}
              </div>
            </td>
          </tr>`;
        }).join('') : '<tr><td colspan="10" style="text-align:center;color:var(--text3);padding:40px">No confirmed bookings yet</td></tr>'}
        </tbody>
      </table>
    </div>`;
}

async function addManualEntry() {
  const name    = document.getElementById('me-name').value.trim();
  const phone   = document.getElementById('me-phone').value.trim();
  const service = document.getElementById('me-service').value.trim();
  const price   = document.getElementById('me-price').value.trim();
  const date    = document.getElementById('me-date').value;
  const notes       = document.getElementById('me-notes').value.trim();
  const delay       = parseInt(document.getElementById('me-delay').value);
  const serviceType = document.getElementById('me-type').value;
  const address     = document.getElementById('me-address').value.trim();
  const msg     = document.getElementById('me-msg');
  if (!name || !service) { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='Name and service are required.'; return; }
  if (serviceType === 'mobile' && !address) { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='Address is required for mobile.'; return; }
  const btn = document.querySelector('[onclick="addManualEntry()"]');
  btn.textContent='Logging...'; btn.disabled=true;
  try {
    const r = await fetch(API + '/api/manual-entry?password=' + encodeURIComponent(pwd), {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ customerName: name, phone, serviceName: service, servicePrice: price, date, notes, reviewDelayMinutes: delay, serviceType, address: serviceType === 'mobile' ? address : null })
    });
    const d = await r.json();
    if (d.success) {
      msg.className='form-msg ok'; msg.style.display='block';
      const smsNote = !phone ? 'No phone — SMS skipped.' : delay === 0 ? 'Review SMS sent immediately.' : `Review SMS scheduled in ${delay/60} hour${delay/60>1?'s':''}.`;
      msg.textContent = '✓ Logged! ' + smsNote;
      document.getElementById('me-name').value='';
      document.getElementById('me-phone').value='';
      document.getElementById('me-service').value='';
      document.getElementById('me-price').value='';
      document.getElementById('me-notes').value='';
      document.getElementById('me-type').value='inshop';
      document.getElementById('me-address').value='';
      document.getElementById('me-address-wrap').style.display='none';
      const br = await fetch(API + '/api/bookings?password=' + encodeURIComponent(pwd));
      bookings = await br.json();
      renderManualEntry();
    } else { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent = d.error || 'Error.'; }
  } catch(e) { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='Connection error.'; }
  btn.textContent='Log Booking'; btn.disabled=false;
}

async function markNoShow(id) {
  if (!confirm('Mark this booking as a no-show? The review SMS will not be sent.')) return;
  const r = await fetch(API + '/api/bookings/' + id + '/noshow?password=' + encodeURIComponent(pwd), { method: 'POST' });
  const d = await r.json();
  if (d.success) {
    bookings = await (await fetch(API + '/api/bookings?password=' + encodeURIComponent(pwd))).json();
    showPage(currentPage);
  } else { alert('Failed to mark as no-show.'); }
}

async function sendWinback(phone, name, btn) {
  btn.textContent = 'Sending…'; btn.disabled = true;
  const r = await fetch(API + '/api/winback?password=' + encodeURIComponent(pwd), {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone, customerName: name })
  });
  const d = await r.json();
  if (d.success) {
    btn.textContent = '✓ Sent!';
    btn.style.borderColor = 'var(--green)'; btn.style.color = 'var(--green)'; btn.style.background = 'var(--green-bg)';
  } else {
    btn.textContent = 'Failed'; btn.disabled = false;
  }
}

  if (!start || !end) { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='Pick both dates.'; return; }
  if (start > end) { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='"From" must be before or same as "To".'; return; }

  // Build list of all dates in range
  const dates = [];
  const cur = new Date(start + 'T12:00:00');
  const last = new Date(end + 'T12:00:00');
  while (cur <= last) {
    dates.push(cur.toISOString().split('T')[0]);
    cur.setDate(cur.getDate() + 1);
  }

  msg.className='form-msg ok'; msg.style.display='block'; msg.textContent=`Blocking ${dates.length} day(s)...`;

  let ok = 0;
  for (const date of dates) {
    try {
      await fetch(API + '/api/blocked?password=' + encodeURIComponent(pwd), {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date })
      });
      ok++;
    } catch(e) {}
  }

  msg.textContent = `✓ Blocked ${ok} day(s): ${new Date(start+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'})} – ${new Date(end+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'})}.`;
  document.getElementById('days-range-start').value = '';
  document.getElementById('days-range-end').value = '';
}

async function blockRange() {
  const date  = document.getElementById('range-date').value;
  const start = document.getElementById('range-start').value;
  const end   = document.getElementById('range-end').value;
  const msg   = document.getElementById('range-msg');
  if (!date || !start || !end) { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='Fill in all three fields.'; return; }
  if (start >= end) { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='"From" must be before "To".'; return; }
  const r = await fetch(API + '/api/blocked/range?password=' + encodeURIComponent(pwd), {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date, startTime: start, endTime: end })
  });
  const d = await r.json();
  if (d.success) {
    msg.className='form-msg ok'; msg.style.display='block';
    msg.textContent=`✓ Blocked all slots from ${formatTime12(start)} to ${formatTime12(end)} on ${new Date(date+'T12:00:00').toLocaleDateString('en-CA',{month:'short',day:'numeric'})}.`;
    document.getElementById('range-date').value='';
    document.getElementById('range-start').value='';
    document.getElementById('range-end').value='';
  } else { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='Error — try again.'; }
}

async function loadBlockDate() {
  const date = document.getElementById('block-date').value;
  if (!date) return;
  const area = document.getElementById('block-slots-area');
  area.innerHTML = `<div style="color:var(--text3);padding:20px">Loading...</div>`;

  const [slotsRes, blockedRes] = await Promise.all([
    fetch(API + '/api/availability?date=' + date),
    fetch(API + '/api/blocked?password=' + encodeURIComponent(pwd))
  ]);
  const slotsData  = await slotsRes.json();
  const blockedAll = await blockedRes.json();

  const dayBlocked = blockedAll.some(b => b.date === date && !b.time);
  const allSlots   = slotsData.slots || [];

  area.innerHTML = `
    <div class="form-card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">
        <div>
          <div style="font-weight:700;font-size:15px">${new Date(date + 'T12:00:00').toLocaleDateString('en-CA', { weekday:'long', month:'long', day:'numeric' })}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px">${dayBlocked ? 'Entire day is blocked' : allSlots.length + ' time slots'}</div>
        </div>
        <button onclick="toggleDay('${date}', ${dayBlocked})" style="padding:10px 18px;border-radius:10px;border:1.5px solid ${dayBlocked ? 'var(--green)' : 'var(--red)'};background:${dayBlocked ? 'var(--green-bg)' : 'var(--red-bg)'};color:${dayBlocked ? 'var(--green)' : 'var(--red)'};font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">
          ${dayBlocked ? '✓ Unblock Entire Day' : '✕ Block Entire Day'}
        </button>
      </div>
      ${dayBlocked ? `<p style="color:var(--text3);font-size:13px">Unblock the day to manage individual slots.</p>` : allSlots.length === 0 ? `<p style="color:var(--text3);font-size:13px">No available slots for this day based on your configured hours.</p>` : `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px">
        ${allSlots.map(s => {
          const isBlocked = s.status === 'blocked' || blockedAll.some(b => b.date === date && b.time === s.time);
          const isBooked  = s.status === 'booked';
          return `<button onclick="${isBooked ? '' : `toggleSlot('${date}','${s.time}',${isBlocked})`}"
            style="padding:12px 8px;border-radius:10px;border:1.5px solid ${isBooked ? 'var(--border)' : isBlocked ? 'var(--red)' : 'var(--green)'};
            background:${isBooked ? 'var(--bg3)' : isBlocked ? 'var(--red-bg)' : 'var(--green-bg)'};
            color:${isBooked ? 'var(--text3)' : isBlocked ? 'var(--red)' : 'var(--green)'};
            font-family:inherit;font-size:13px;font-weight:600;cursor:${isBooked ? 'default' : 'pointer'};text-align:center">
            <div>${formatTime12(s.time)}</div>
            <div style="font-size:10px;margin-top:3px;text-transform:uppercase;letter-spacing:0.05em">${isBooked ? 'Booked' : isBlocked ? 'Blocked' : 'Open'}</div>
          </button>`;
        }).join('')}
      </div>`}
    </div>`;
}

function formatTime12(t) {
  const [h, m] = t.split(':');
  const hr = parseInt(h);
  return `${hr > 12 ? hr - 12 : hr || 12}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
}

async function toggleDay(date, isBlocked) {
  await fetch(API + '/api/blocked?password=' + encodeURIComponent(pwd), {
    method: isBlocked ? 'DELETE' : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date })
  });
  loadBlockDate();
}

async function toggleSlot(date, time, isBlocked) {
  await fetch(API + '/api/blocked?password=' + encodeURIComponent(pwd), {
    method: isBlocked ? 'DELETE' : 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date, time })
  });
  loadBlockDate();
}

// ── Reviews ───────────────────────────────────────────────────
function renderReviews() {
  const starBar = (r) => '★'.repeat(r) + '☆'.repeat(5 - r);
  const starColor = (r) => r >= 4 ? 'var(--green)' : r === 3 ? 'var(--yellow)' : 'var(--red)';
  const fmtTs = (iso) => {
    const d = new Date(iso);
    return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  };

  const cards = feedback.length
    ? feedback.map(f => `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
          <div style="display:flex;align-items:center;gap:10px">
            <div style="width:36px;height:36px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text)">${(f.customerName||'?')[0].toUpperCase()}</div>
            <div>
              <div style="font-weight:600;font-size:14px">${f.customerName || 'Customer'}</div>
              <div style="font-size:11px;color:var(--text3)">${f.serviceName || ''}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span style="color:${starColor(f.rating)};font-size:15px;letter-spacing:1px">${starBar(f.rating)}</span>
            <span style="font-size:11px;color:var(--text3)">${fmtTs(f.submittedAt)}</span>
            ${f.rating >= 4
              ? `<span style="background:var(--green-bg);color:var(--green);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:0.05em">→ GOOGLE</span>`
              : `<span style="background:var(--red-bg);color:var(--red);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;letter-spacing:0.05em">PRIVATE</span>`}
          </div>
        </div>
        ${f.comment ? `<p style="font-size:13px;color:var(--text2);line-height:1.6;margin-top:4px;padding-top:12px;border-top:1px solid var(--border)">"${f.comment}"</p>` : ''}
      </div>`)
    .join('')
    : `<div style="text-align:center;color:var(--text3);padding:60px 20px;background:var(--bg3);border-radius:var(--radius)">No reviews yet — they'll appear here after customers submit feedback.</div>`;

  document.getElementById('main').innerHTML = `
    <div class="page-hdr"><h1>Reviews</h1><p>Automated follow-up performance</p></div>
    <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card yellow">
        <div class="stat-lbl">Avg Rating</div>
        <div class="stat-num yellow">${stats.avgRating || '—'}</div>
        <div class="stat-sub">From review system</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-lbl">Review Rate</div>
        <div class="stat-num blue">${stats.reviewRate}%</div>
        <div class="stat-sub">Industry average ~8%</div>
      </div>
      <div class="stat-card green">
        <div class="stat-lbl">Total Reviews</div>
        <div class="stat-num green">${feedback.length}</div>
        <div class="stat-sub">SMS fires 24h after appointment</div>
      </div>
    </div>
    <div class="form-card" style="margin-bottom:20px">
      <h3>How the review funnel works</h3>
      <p style="margin-bottom:12px">Every booking and walk-in automatically triggers a review SMS 24 hours after the appointment. 4–5 stars redirects to Google, 1–3 stars stays private here.</p>
      <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">
        ${[['1','Appointment done'],['→',''],['2','SMS fires +24h'],['→',''],['4-5★','→ Google review'],['→',''],['1-3★','→ Private feedback']].map(([l,t]) =>
          t ? `<div style="background:var(--bg3);border-radius:10px;padding:12px 16px"><div style="font-size:18px;font-weight:800;color:var(--text)">${l}</div><div style="font-size:11px;color:var(--text3);margin-top:3px">${t}</div></div>`
            : `<div style="color:var(--text3);font-size:18px">${l}</div>`
        ).join('')}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">${cards}</div>`;
}

// ── Expenses ─────────────────────────────────────────────────
function renderExpenses() {
  const totalExp = expenses.reduce((s,e) => s+(Number(e.amount)||0), 0);
  const byCategory = {};
  expenses.forEach(e => { byCategory[e.category] = (byCategory[e.category]||0) + (Number(e.amount)||0); });
  const catBadgeColor = (c) => ({
    'Supplies':'var(--primary)','Equipment':'var(--green)','Vehicle / Fuel':'var(--yellow)',
    'Marketing':'rgba(168,85,247,1)','Software':'var(--primary)','Labor':'var(--green)'
  }[c] || 'var(--text2)');
  const catBadgeBg = (c) => ({
    'Supplies':'var(--primary-glow)','Equipment':'var(--green-bg)','Vehicle / Fuel':'var(--yellow-bg)',
    'Marketing':'rgba(168,85,247,0.12)','Software':'var(--primary-glow)','Labor':'var(--green-bg)'
  }[c] || 'var(--bg3)');

  document.getElementById('main').innerHTML = `
    <div class="page-hdr"><h1>Expenses</h1><p>Log business costs to calculate true profit</p></div>

    <div class="form-card" style="margin-bottom:20px">
      <h3 style="margin-bottom:16px">Log an expense</h3>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:12px;align-items:end;flex-wrap:wrap" id="ex-form-row">
        <div class="field" style="margin:0"><label>Description</label><input type="text" id="ex-desc" placeholder="e.g. Polishing compound"/></div>
        <div class="field" style="margin:0"><label>Category</label>
          <select id="ex-cat">
            <option>Supplies</option><option>Equipment</option><option>Vehicle / Fuel</option>
            <option>Marketing</option><option>Software</option><option>Labor</option><option>Other</option>
          </select>
        </div>
        <div class="field" style="margin:0"><label>Amount ($)</label><input type="number" id="ex-amount" placeholder="49.99" min="0" step="0.01"/></div>
        <div class="field" style="margin:0"><label>Date</label><input type="date" id="ex-date" value="${new Date().toISOString().split('T')[0]}"/></div>
        <button class="btn-sm" onclick="addExpense()" style="height:44px;margin-top:20px">Add</button>
      </div>
      <div class="form-msg" id="ex-msg"></div>
    </div>

    ${Object.keys(byCategory).length ? `
    <div class="stats-row" style="margin-bottom:20px">
      ${Object.entries(byCategory).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([cat,amt]) => `
        <div class="stat-card blue">
          <div class="stat-lbl">${cat}</div>
          <div class="stat-num" style="color:${catBadgeColor(cat)}">$${amt.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
          <div class="stat-sub">${expenses.filter(e=>e.category===cat).length} expense${expenses.filter(e=>e.category===cat).length!==1?'s':''}</div>
        </div>`).join('')}
    </div>` : ''}

    <div class="table-wrap">
      <div class="table-head">
        <span class="table-head-title">All Expenses</span>
        <span style="font-size:13px;color:var(--red);font-weight:700">Total: $${totalExp.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
      </div>
      <table>
        <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Amount</th><th></th></tr></thead>
        <tbody>${expenses.length ? expenses.map(e => `<tr>
          <td style="color:var(--text3);font-size:12px">${e.date}</td>
          <td style="font-weight:600">${e.description}</td>
          <td><span style="background:${catBadgeBg(e.category)};color:${catBadgeColor(e.category)};font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;letter-spacing:0.04em">${e.category}</span></td>
          <td style="font-weight:700;color:var(--red)">$${Number(e.amount).toFixed(2)}</td>
          <td><button onclick="deleteExpense('${e.id}')" style="padding:4px 10px;border-radius:6px;border:1.5px solid var(--red);background:var(--red-bg);color:var(--red);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer">Delete</button></td>
        </tr>`).join('') : '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:40px">No expenses logged yet</td></tr>'}
        </tbody>
      </table>
    </div>`;

  // Make form grid responsive on mobile
  if (window.innerWidth < 700) {
    document.getElementById('ex-form-row').style.gridTemplateColumns = '1fr 1fr';
  }
}

async function addExpense() {
  const desc   = document.getElementById('ex-desc').value.trim();
  const cat    = document.getElementById('ex-cat').value;
  const amount = document.getElementById('ex-amount').value;
  const date   = document.getElementById('ex-date').value;
  const msg    = document.getElementById('ex-msg');
  if (!desc || !amount) { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='Description and amount required.'; return; }
  const btn = document.querySelector('[onclick="addExpense()"]');
  btn.textContent='Adding…'; btn.disabled=true;
  try {
    const r = await fetch(API + '/api/expenses?password=' + encodeURIComponent(pwd), {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ description:desc, category:cat, amount, date })
    });
    const d = await r.json();
    if (d.success) {
      expenses = await (await fetch(API + '/api/expenses?password=' + encodeURIComponent(pwd))).json();
      stats    = await (await fetch(API + '/api/stats?password='    + encodeURIComponent(pwd))).json();
      renderExpenses();
    } else { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='Error saving expense.'; btn.textContent='Add'; btn.disabled=false; }
  } catch(e) { msg.className='form-msg fail'; msg.style.display='block'; msg.textContent='Connection error. Try again.'; btn.textContent='Add'; btn.disabled=false; }
}

async function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  await fetch(API + '/api/expenses/' + id + '?password=' + encodeURIComponent(pwd), { method:'DELETE' });
  expenses = await (await fetch(API + '/api/expenses?password=' + encodeURIComponent(pwd))).json();
  stats    = await (await fetch(API + '/api/stats?password='    + encodeURIComponent(pwd))).json();
  renderExpenses();
}

function logout() {
  API=''; pwd=''; stats=null; bookings=[]; walkins=[];
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('pwd').value='';
  document.getElementById('api-url').value='';
  document.getElementById('url-preview').textContent='';
  document.getElementById('err').style.display='none';
  document.getElementById('login-btn').textContent='Access Dashboard';
  document.getElementById('login-btn').disabled=false;
}
</script>
</body>
</html>
